name: Continue Elite Configs
version: 4.35.0
schema: v1
models:
  # Fast coding chatter (small context, quick changes)
  - name: 1.1 Fast | Compound Mini | Groq | 131k/8k
    provider: groq
    model: groq/compound-mini
    apiKey: ${{ secrets.GROQ_API_KEY }}
  - name: 1.2 Fast | Compound | Groq | 131k/8k
    provider: groq
    model: groq/compound
    apiKey: ${{ secrets.GROQ_API_KEY }}
  - name: 1.3 Fast | Qwen 3.6 27B | Groq | 131k/32k
    provider: groq
    model: qwen/qwen3.6-27b
    apiKey: ${{ secrets.GROQ_API_KEY }}
  - name: 1.4 Fast | DeepSeek V3.2 | Sambanova | 32k/7k
    provider: sambanova
    model: DeepSeek-V3.2
    apiKey: ${{ secrets.SAMBANOVA_API_KEY }}
  - name: 1.5 Fast | Llama 3.1 8B Instant | Groq | 131k/131k
    provider: groq
    model: llama-3.1-8b-instant
    apiKey: ${{ secrets.GROQ_API_KEY }}

  # Code review chatter (moderate context, multi‑file diffs)
  - name: 2.1 Refactor | Qwen 3.6 27B | Groq | 131k/32k
    provider: groq
    model: qwen/qwen3.6-27b
    apiKey: ${{ secrets.GROQ_API_KEY }}
  - name: 2.2 Refactor | Llama 3.3 70B Versatile | Groq | 131k/32k
    provider: groq
    model: llama-3.3-70b-versatile
    apiKey: ${{ secrets.GROQ_API_KEY }}
  - name: 2.3 Refactor | Llama 3.1 8B Instant | Groq | 131k/131k
    provider: groq
    model: llama-3.1-8b-instant
    apiKey: ${{ secrets.GROQ_API_KEY }}
  - name: 2.4 Refactor | DeepSeek V3.1 | Sambanova | 131k/7k
    provider: sambanova
    model: DeepSeek-V3.1
    apiKey: ${{ secrets.SAMBANOVA_API_KEY }}
  - name: 2.5 Refactor | North Mini Code | Openrouter | 256k/64k
    provider: openrouter
    model: cohere/north-mini-code:free
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}

  # Deep thinking / large context analysis
  - name: 3.1 Think | Gemini 2.5 Flash | Gemini | 1048k/65k
    provider: gemini
    model: gemini-2.5-flash
    apiKey: ${{ secrets.GEMINI_API_KEY }}
  - name: 3.2 Think | Gemini Pro Latest | Gemini | 1048k/65k
    provider: gemini
    model: gemini-pro-latest
    apiKey: ${{ secrets.GEMINI_API_KEY }}
  - name: 3.3 Think | Nemotron 3 Super 120B | Openrouter | 1000k/262k
    provider: openrouter
    model: nvidia/nemotron-3-super-120b-a12b:free
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
  - name: 3.4 Think | Tencent HY3 | Openrouter | 262k/262k
    provider: openrouter
    model: tencent/hy3:free
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
  - name: 3.5 Think | Gemma 4 31B IT | Openrouter | 262k/32k
    provider: openrouter
    model: google/gemma-4-31b-it:free
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}